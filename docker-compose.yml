services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortexos_postgres
    environment:
      POSTGRES_USER: cortexos
      POSTGRES_PASSWORD: cortexos_dev
      POSTGRES_DB: cortexos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
