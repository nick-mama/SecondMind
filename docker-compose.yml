services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: secondmind_postgres
    environment:
      POSTGRES_USER: secondmind
      POSTGRES_PASSWORD: secondmind_dev
      POSTGRES_DB: secondmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: secondmind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
