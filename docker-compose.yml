services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: secondmind_postgres
    environment:
      POSTGRES_USER: secondmind
      POSTGRES_PASSWORD: secondmind_dev
      POSTGRES_DB: secondmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
